# media-insights configuration
# Copy to /config/config.yaml inside the container, or pass --config /path/to.yaml.

config_dir: /config       # where the database lives
data_dir:   /data         # mount your media under here
log_level:  INFO

database:
  # SQLite is the default. Swap to PostgreSQL when needed:
  # url: postgresql+psycopg://user:pass@host/media_insights
  url: sqlite:///{config_dir}/media_insights.db

# Fingerprinting strategy. Cheaper strategies run faster on big libraries.
# mtime   - cheapest, can miss same-size rewrites
# partial - BLAKE2b over first/last 8 MiB + size (recommended for most users)
# full    - bit-exact, very slow on multi-GB remuxes
fingerprint:
  strategy: partial
  chunk_bytes: 8388608   # 8 MiB head/tail

# Filesystem watcher. Use polling on network mounts (NFS/SMB) where inotify
# is unavailable.
watcher:
  enabled: true
  recursive: true
  observer: auto          # auto | inotify | polling
  debounce_seconds: 5     # coalesce bursts

# Periodic deep scan, even with watcher on (belt + braces).
schedule:
  enabled: true
  cron: "0 */6 * * *"     # every 6 hours; off the :00 mark

# Libraries to scan. A library is one folder, one hint.
# Hint shapes the matcher and seeds the classifier.
# kind: movie | tv | anime | auto
libraries:
  - name: Movies
    path: /data/movies
    kind: movie
  - name: TV
    path: /data/tv
    kind: tv
  - name: Anime
    path: /data/anime
    kind: anime

# Webhook delivery. Sign payloads with HMAC-SHA256 so receivers can verify.
webhooks:
  - name: default
    url: ""               # empty disables delivery; set to e.g. http://hooks:9000/event
    secret: ""            # shared HMAC secret; empty -> no signature
    timeout_seconds: 10
    max_attempts: 8

# Arbitrary local hooks. The outbox writes {old, new} JSON to the script's stdin.
exec_hooks:
  - name: log-changes
    command: ""
    timeout_seconds: 30

# Server bind for the REST API + Web UI.
server:
  host: 0.0.0.0
  port: 8765

# ffmpeg/ffprobe location. Leave empty for PATH lookup.
ffmpeg:
  ffprobe: ""
  mediainfo_cli: ""       # optional; if absent, only ffprobe is used
# Online metadata providers. OFF by default: media-insights indexes a library
# perfectly well with no network access, and turning this on is your explicit
# choice to make outbound calls.
#
# Why turn it on: local evidence can't always tell what a title *is*. An
# English-dubbed anime with no Japanese audio track and no fansub tag looks
# exactly like a western cartoon on disk -- which is how anime ends up
# misfiled in a TV library and stays undetected. Providers close that gap,
# and also fill in imdb/tmdb/tvdb IDs, which drains the unmatched queue.
providers:
  enabled: false
  timeout_seconds: 10
  cache_ttl_days: 30      # a title is only re-queried after this long

  # AniList needs no API key. It indexes only anime, so a hit is the signal --
  # and a miss (western cartoons, live-action) is meaningful too.
  anilist:
    enabled: true

  # TMDB covers movies and TV, supplies origin_country + genres, and is the
  # only practical way to get an IMDB id (IMDB has no free public API).
  # It's also what distinguishes "animated but NOT anime" (Rick and Morty,
  # Arcane) from actual anime. Free key: https://www.themoviedb.org/settings/api
  # Can also be set via MI_PROVIDERS__TMDB__API_KEY to keep it out of this file.
  #
  # Either TMDB credential works and is auto-detected:
  #   - the "API Key" (v3): a short hex string
  #   - the "API Read Access Token" (v4): a long token starting with eyJ...
  # Check it actually works with:  curl -X GET localhost:8765/api/providers
  tmdb:
    enabled: false
    api_key: ""

  # TVDB v4. Optional -- AniList + TMDB already cover anime detection and
  # give you the IMDB id, so leaving this off costs you only the tvdb_id.
  # Key: https://thetvdb.com/api-information  (MI_PROVIDERS__TVDB__API_KEY)
  tvdb:
    enabled: false
    api_key: ""
    pin: ""               # only for user-subscription keys
