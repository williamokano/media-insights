{% extends "base.html" %}
{% block title %}Search &middot; media-insights{% endblock %}
{% block content %}
<h1>Search</h1>
<form onsubmit="doSearch(event)">
  <input id="q" name="q" value="{{ q }}" placeholder="title or filename fragment">
  <button type="submit">Search</button>
</form>
<div id="results"></div>
<script>
async function doSearch(ev) {
  ev.preventDefault();
  const q = document.getElementById('q').value;
  if (!q) return;
  const r = await fetch('/api/search?q=' + encodeURIComponent(q));
  const data = await r.json();
  const results = document.getElementById('results');
  let html = '<h2>Items (' + data.items.length + ')</h2><ul class="results">';
  for (const it of data.items) {
    html += '<li><a href="/items/' + it.id + '">' + it.title + '</a>';
    if (it.year) html += ' <span class="year">(' + it.year + ')</span>';
    html += ' &mdash; <span class="badge">' + (it.classification.label || '?') + '</span></li>';
  }
  html += '</ul>';
  html += '<h2>Files (' + data.files.length + ')</h2><ul class="results">';
  for (const f of data.files) {
    html += '<li><code>' + f.path + '</code></li>';
  }
  html += '</ul>';
  results.innerHTML = html;
}
if (document.getElementById('q').value) doSearch(new Event('load'));
</script>
{% endblock %}
